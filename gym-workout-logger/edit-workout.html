<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Workout — Workout Log</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

  
  <nav class="navbar site-nav fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <span class="brand-mark">W</span>
        Workout Log
      </a>
    </div>
  </nav>

  
  <div class="container">
    <div class="py-4 border-bottom mb-4 fade-in">
      <a href="index.html" class="back-link">← Back</a>
      <h1 class="fw-black mb-0" style="font-size:1.75rem;letter-spacing:-0.035em">Edit Workout</h1>
    </div>
  </div>

  
  <main class="container pb-5">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-6">

        <div id="not-found" class="alert alert-warning d-none fade-in" role="alert">
          Workout not found. <a href="index.html" class="alert-link">Go back</a>.
        </div>

        <div class="card border rounded-3 fade-in-d1">

          <div class="card-header px-4 py-3 border-bottom">
            <span class="text-uppercase fw-bold text-secondary" style="font-size:0.68rem;letter-spacing:0.18em">Update Entry</span>
          </div>

          <div class="card-body p-4">
            <form id="edit-workout-form" novalidate>

              <div class="mb-3">
                <label for="exercise" class="form-label">Exercise Name</label>
                <input type="text" class="form-control" id="exercise"
                  placeholder="e.g. Bench Press" required />
                <div class="invalid-feedback">Please enter an exercise name.</div>
              </div>

              <div class="row g-3 mb-3">
                <div class="col-sm-4">
                  <label for="sets" class="form-label">Sets</label>
                  <input type="number" class="form-control" id="sets" min="1" required />
                  <div class="invalid-feedback">Min 1.</div>
                </div>
                <div class="col-sm-4">
                  <label for="reps" class="form-label">Reps</label>
                  <input type="number" class="form-control" id="reps" min="1" required />
                  <div class="invalid-feedback">Min 1.</div>
                </div>
                <div class="col-sm-4">
                  <label for="weight" class="form-label">Weight (kg)</label>
                  <input type="number" class="form-control" id="weight"
                    min="0" step="0.5" required />
                  <div class="invalid-feedback">Min 0.</div>
                </div>
              </div>

              <div class="mb-4">
                <label for="date" class="form-label">Date</label>
                <input type="date" class="form-control" id="date" required />
                <div class="invalid-feedback">Please select a date.</div>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-white rounded-2 flex-grow-1">Update Workout</button>
                <a href="index.html" class="btn btn-ghost rounded-2 flex-grow-1 text-center">Cancel</a>
              </div>

            </form>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="scripts/edit-workout.js"></script>
</body>
</html>
