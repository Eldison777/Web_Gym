<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delete Workout — Workout Log</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar site-nav fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <span class="brand-mark">W</span>
        Workout Log
      </a>
    </div>
  </nav>

  <!-- Page header -->
  <div class="container">
    <div class="py-4 border-bottom mb-4 fade-in">
      <a href="index.html" class="back-link">← Back</a>
      <h1 class="fw-black mb-0" style="font-size:1.75rem;letter-spacing:-0.035em">Delete Workout</h1>
    </div>
  </div>

  <!-- Confirm section -->
  <main class="container pb-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">

        <div id="not-found" class="alert alert-warning d-none fade-in" role="alert">
          Workout not found. <a href="index.html" class="alert-link">Go back</a>.
        </div>

        <div id="confirm-wrapper" class="d-none fade-in-d1">

          <div class="card border rounded-3 mb-3">

            <div class="card-header px-4 py-3 border-bottom">
              <span class="text-uppercase fw-bold text-secondary" style="font-size:0.68rem;letter-spacing:0.18em">Confirm Delete</span>
            </div>

            <div class="card-body p-4">
              <p class="text-secondary small mb-4" style="line-height:1.7">
                This will permanently remove the entry.
                This action <strong class="text-white">cannot be undone.</strong>
              </p>
              <!-- Populated by delete-workout.js -->
              <div id="workout-details"></div>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button id="btn-confirm-delete" class="btn btn-danger rounded-2 flex-grow-1 fw-bold">Delete</button>
            <a href="index.html" class="btn btn-ghost rounded-2 flex-grow-1 text-center">Cancel</a>
          </div>

        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="scripts/delete-workout.js"></script>
</body>
</html>
